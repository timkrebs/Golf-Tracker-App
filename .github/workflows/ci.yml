name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  XCODE_VERSION: '16.1'
  IOS_SIMULATOR_DEVICE: 'iPhone 16 Pro'
  IOS_SIMULATOR_OS: '18.1'

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}
        
    - name: List Available Simulators
      run: |
        xcrun simctl list devices available
        
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: |
          .build
          DerivedData
          ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Create Config.plist for Testing
      run: |
        mkdir -p GolfTracker
        cat > GolfTracker/Config.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
        	<key>SUPABASE_URL</key>
        	<string>${{ secrets.SUPABASE_URL }}</string>
        	<key>SUPABASE_ANON_KEY</key>
        	<string>${{ secrets.SUPABASE_ANON_KEY }}</string>
        	<key>GOLF_API_BASE_URL</key>
        	<string>${{ secrets.GOLF_API_BASE_URL || 'https://golftracker-app-service.azurewebsites.net' }}</string>
        	<key>ENVIRONMENT</key>
        	<string>testing</string>
        </dict>
        </plist>
        EOF
        
    - name: Resolve Swift Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies -project GolfTracker.xcodeproj -verbose
        
    - name: Build for Testing (Unit Tests Only)
      run: |
        xcodebuild clean build-for-testing \
          -project GolfTracker.xcodeproj \
          -scheme GolfTracker \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_DEVICE }},OS=${{ env.IOS_SIMULATOR_OS }}" \
          -only-testing:GolfTrackerTests \
          -derivedDataPath DerivedData
          
    - name: Run Unit Tests Only
      run: |
        xcodebuild test-without-building \
          -project GolfTracker.xcodeproj \
          -scheme GolfTracker \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_DEVICE }},OS=${{ env.IOS_SIMULATOR_OS }}" \
          -only-testing:GolfTrackerTests \
          -derivedDataPath DerivedData \
          -resultBundlePath TestResults.xcresult
          
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: TestResults.xcresult

  build:
    name: Build Verification
    runs-on: macos-15
    needs: test
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}
        
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: |
          .build
          DerivedData
          ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', '**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-spm-
          
    - name: Create Config.plist for Build
      run: |
        mkdir -p GolfTracker
        cat > GolfTracker/Config.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
        	<key>SUPABASE_URL</key>
        	<string>${{ secrets.SUPABASE_URL }}</string>
        	<key>SUPABASE_ANON_KEY</key>
        	<string>${{ secrets.SUPABASE_ANON_KEY }}</string>
        	<key>GOLF_API_BASE_URL</key>
        	<string>${{ secrets.GOLF_API_BASE_URL || 'https://golftracker-app-service.azurewebsites.net' }}</string>
        	<key>ENVIRONMENT</key>
        	<string>production</string>
        </dict>
        </plist>
        EOF
        
    - name: Build for iOS Simulator (No Signing Required)
      run: |
        xcodebuild clean build \
          -project GolfTracker.xcodeproj \
          -scheme GolfTracker \
          -destination "platform=iOS Simulator,name=${{ env.IOS_SIMULATOR_DEVICE }},OS=${{ env.IOS_SIMULATOR_OS }}" \
          -derivedDataPath DerivedData
          
    - name: Upload Build Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-logs
        path: DerivedData/Logs

  lint:
    name: SwiftLint
    runs-on: macos-15
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Install SwiftLint
      run: brew install swiftlint
      
    - name: Run SwiftLint
      run: swiftlint lint --strict 